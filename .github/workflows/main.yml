name: main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
        
      - name: Run test
        run: python -m unittest discover -s . -p "test_add.py"
        
  deploy:
    needs: test
    runs-on: windows-latest
  
    steps:
      - name: deploy application
        run: echo 'Deploying'
